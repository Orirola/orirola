<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ガチャシミュレーター（ストック式）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .prize-S { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #000; }
        .prize-A { background: linear-gradient(135deg, #a5b4fc, #6366f1); color: #000; }
        .prize-B { background: linear-gradient(135deg, #6ee7b7, #10b981); color: #000; }
        .prize-C { background: linear-gradient(135deg, #93c5fd, #3b82f6); color: #000; }
        
        .prize-input { transition: all 0.2s; }
        .prize-input:focus { border-color: #fbbf24; box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <div class="max-w-5xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-center mb-8 bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent">
            🎰 ガチャシミュレーター（ストック式）
        </h1>

        <!-- 設定部分（省略せずそのまま） -->
        <div class="bg-gray-900 rounded-3xl p-6 shadow-xl mb-8">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">⚙️ 設定</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">初期コイン数</label>
                    <input id="initialBalance" type="number" value="2000000" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 text-lg">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">1回転のコイン数</label>
                    <input id="coinPerSpin" type="number" value="10000" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 text-lg" onchange="rebuildPool()">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">合計口数</label>
                    <input id="totalSlots" type="number" value="12000" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 text-lg" onchange="rebuildPool()">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">目標還元率</label>
                    <div class="flex items-center gap-2 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3">
                        <input id="targetRTP" type="number" value="97" step="0.1" class="flex-1 bg-transparent text-lg focus:outline-none">
                        <span class="text-gray-400">%</span>
                    </div>
                </div>
            </div>

            <button onclick="autoCalculatePrizes()" class="mt-6 w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-medium text-lg">
                🔧 ロックされていない賞を自動調整
            </button>

            <div class="mt-6 bg-gray-800 rounded-2xl p-5 flex items-center justify-between">
                <div>
                    <div class="text-sm text-gray-400">現在の還元率</div>
                    <div id="returnRate" class="text-4xl font-bold text-green-400">97.00 %</div>
                </div>
                <div id="expectedValue" class="text-right text-gray-400"></div>
            </div>

            <div class="mt-8">
                <h3 class="text-lg font-medium mb-4">賞設定（S〜C）</h3>
                <div id="prizeSettings" class="space-y-4"></div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="addPrizeRow()" class="flex-1 bg-gray-800 hover:bg-gray-700 py-4 rounded-2xl">+ 賞を追加</button>
                <button onclick="resetToDefault()" class="flex-1 bg-red-900 hover:bg-red-800 py-4 rounded-2xl">全リセット</button>
            </div>
        </div>

        <!-- シミュレーター部分 -->
        <div class="space-y-8">
            <div class="bg-gray-900 rounded-3xl p-6 shadow-xl">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <div class="text-sm text-gray-400">現在の残高</div>
                        <div id="balance" class="text-5xl font-bold text-yellow-400">2,000,000</div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm text-gray-400">合計獲得</div>
                        <div id="totalWin" class="text-5xl font-bold text-green-400">0</div>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button onclick="spin(1)" id="btn1" class="flex-1 bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-600 hover:to-orange-600 text-black font-bold py-7 rounded-3xl text-2xl">1回引く</button>
                    <button onclick="spin(10)" id="btn10" class="flex-1 bg-gradient-to-r from-amber-500 to-yellow-500 hover:from-amber-600 hover:to-yellow-600 text-black font-bold py-7 rounded-3xl text-2xl">10回引く</button>
                    <button onclick="spin(100)" id="btn100" class="flex-1 bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold py-7 rounded-3xl text-2xl">100回引く</button>
                </div>

                <div id="remainingInfo" class="mt-6 text-center text-2xl font-bold text-yellow-400"></div>
            </div>

            <!-- 賞別当選回数付き統計 -->
            <div class="bg-gray-900 rounded-3xl p-6 shadow-xl">
                <h3 class="font-semibold text-xl mb-5">統計</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="bg-gray-800 rounded-2xl p-6 text-center">
                        <div class="text-gray-400 text-sm">総回転数</div>
                        <div id="totalSpins" class="text-4xl font-bold mt-2">0</div>
                    </div>
                    <div class="bg-gray-800 rounded-2xl p-6 text-center">
                        <div class="text-gray-400 text-sm">残り口数</div>
                        <div id="remaining" class="text-4xl font-bold text-yellow-400 mt-2">12000</div>
                    </div>
                    <div class="bg-gray-800 rounded-2xl p-6 text-center">
                        <div class="text-gray-400 text-sm">総獲得</div>
                        <div id="totalWon" class="text-4xl font-bold text-green-400 mt-2">0</div>
                    </div>
                    <div class="bg-gray-800 rounded-2xl p-6 text-center">
                        <div class="text-gray-400 text-sm">収支</div>
                        <div id="net" class="text-4xl font-bold mt-2">0</div>
                    </div>
                </div>

                <!-- 新規追加：賞別当選回数 -->
                <div class="mt-8">
                    <h4 class="font-medium text-lg mb-4">賞別当選回数</h4>
                    <div id="prizeStats" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>
            </div>

            <!-- 履歴 -->
            <div class="bg-gray-900 rounded-3xl p-6 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold text-xl">抽選結果履歴</h3>
                    <button onclick="clearHistory()" class="text-sm px-6 py-2 bg-gray-800 hover:bg-red-900 rounded-full">クリア</button>
                </div>
                <div id="history" class="max-h-96 overflow-y-auto space-y-2 text-sm"></div>
            </div>
        </div>
    </div>

    <!-- 結果モーダル（省略せず） -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-gray-900 rounded-3xl max-w-md w-full mx-4 overflow-hidden">
            <div id="modalPrize" class="p-10 text-center text-7xl font-bold prize-S"></div>
            <div class="p-8 text-center">
                <div id="modalAmount" class="text-6xl font-bold mb-3"></div>
                <div id="modalMessage" class="text-2xl text-gray-300"></div>
            </div>
            <div class="p-5 border-t border-gray-700">
                <button onclick="closeModal()" class="w-full py-5 bg-gray-800 hover:bg-gray-700 rounded-2xl text-xl font-medium">OK</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 2000000;
        let totalSpins = 0;
        let totalCost = 0;
        let totalWon = 0;
        let history = [];
        let prizePool = [];

        // 当選回数カウンター
        let winCount = { S: 0, A: 0, B: 0, C: 0 };

        let prizes = [
            { rank: "S", amount: 1000000, count: 1, locked: false },
            { rank: "A", amount: 51700, count: 35, locked: false },
            { rank: "B", amount: 18000, count: 6280, locked: false },
            { rank: "C", amount: 100, count: 5684, locked: false }
        ];

        function renderPrizeSettings() {
            const container = document.getElementById('prizeSettings');
            container.innerHTML = '';
            prizes.forEach((prize, index) => {
                const div = document.createElement('div');
                div.className = 'grid grid-cols-12 gap-4 bg-gray-800 rounded-2xl p-5 items-center';
                div.innerHTML = `
                    <div class="col-span-2 flex items-center">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-2xl prize-${prize.rank}">${prize.rank}</div>
                    </div>
                    <div class="col-span-5">
                        <label class="block text-xs text-gray-400 mb-1">当選金額</label>
                        <input type="number" value="${prize.amount}" onchange="updatePrize(${index}, 'amount', this.value)" 
                               class="prize-input w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 text-xl font-medium">
                    </div>
                    <div class="col-span-4">
                        <label class="block text-xs text-gray-400 mb-1">口数</label>
                        <input type="number" value="${prize.count}" onchange="updatePrize(${index}, 'count', this.value)" 
                               class="prize-input w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 text-xl font-medium">
                    </div>
                    <div class="col-span-1 flex flex-col items-center justify-center pt-6">
                        <input type="checkbox" ${prize.locked ? 'checked' : ''} onchange="toggleLock(${index}, this.checked)" class="w-7 h-7 accent-yellow-400">
                        <span class="text-[10px] mt-1 text-gray-500">LOCK</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updatePrize(index, field, value) {
            prizes[index][field] = parseInt(value) || 0;
        }

        function toggleLock(index, isLocked) {
            prizes[index].locked = isLocked;
        }

        function rebuildPool() {
            prizePool = [];
            const totalSlots = parseInt(document.getElementById('totalSlots').value) || 12000;

            prizes.forEach(p => {
                for (let i = 0; i < p.count; i++) {
                    prizePool.push({ rank: p.rank, amount: p.amount });
                }
            });

            const current = prizePool.length;
            for (let i = current; i < totalSlots; i++) prizePool.push(null);

            // シャッフル
            for (let i = prizePool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [prizePool[i], prizePool[j]] = [prizePool[j], prizePool[i]];
            }

            updateReturnRate();
            checkSpinLimit();
        }

        function calculateExpectedValue() {
            const totalSlots = parseInt(document.getElementById('totalSlots').value) || 12000;
            let total = 0;
            prizes.forEach(p => total += p.amount * p.count);
            return total / totalSlots;
        }

        function updateReturnRate() {
            const coinPerSpin = parseInt(document.getElementById('coinPerSpin').value) || 10000;
            const expected = calculateExpectedValue();
            const rtp = coinPerSpin > 0 ? (expected / coinPerSpin) * 100 : 0;
            document.getElementById('returnRate').textContent = rtp.toFixed(2) + " %";
            document.getElementById('expectedValue').textContent = `期待値: ${expected.toFixed(2)} コイン/回`;
        }

        function autoCalculatePrizes() { /* 前回と同じ */ 
            const targetRTP = parseFloat(document.getElementById('targetRTP').value) || 97;
            const coinPerSpin = parseInt(document.getElementById('coinPerSpin').value) || 10000;
            const totalSlots = parseInt(document.getElementById('totalSlots').value) || 12000;

            const targetExpected = (targetRTP / 100) * coinPerSpin;
            const targetTotal = targetExpected * totalSlots;

            let fixed = 0, variableCurrent = 0;
            prizes.forEach(p => {
                if (p.locked) fixed += p.amount * p.count;
                else variableCurrent += p.amount * p.count;
            });

            if (variableCurrent === 0) return alert("ロックされていない賞がありません");

            const scale = (targetTotal - fixed) / variableCurrent;
            prizes.forEach(p => { if (!p.locked) p.amount = Math.round(p.amount * scale); });

            renderPrizeSettings();
            rebuildPool();
            alert(`目標 ${targetRTP}% に調整しました`);
        }

        function addPrizeRow() { /* 前回と同じ */ 
            if (prizes.length >= 5) return alert("最大5段階までです");
            const ranks = ["S","A","B","C","D"];
            prizes.push({ rank: ranks[prizes.length], amount: 300, count: 300, locked: false });
            renderPrizeSettings();
            rebuildPool();
        }

        function checkSpinLimit() {
            const remaining = prizePool.length;
            document.getElementById('remaining').textContent = remaining.toLocaleString();
            document.getElementById('remainingInfo').textContent = `残り ${remaining.toLocaleString()} 回`;

            document.getElementById('btn1').disabled = remaining < 1;
            document.getElementById('btn10').disabled = remaining < 10;
            document.getElementById('btn100').disabled = remaining < 100;
        }

        function spin(times = 1) {
            if (prizePool.length < times) return alert(`残り ${prizePool.length} 回しか引けません`);
            const coinPerSpin = parseInt(document.getElementById('coinPerSpin').value) || 10000;
            const cost = coinPerSpin * times;
            if (balance < cost) return alert("コインが足りません！");

            balance -= cost;
            totalCost += cost;
            totalSpins += times;

            let thisWin = 0;
            let resultsThisTime = [];

            for (let i = 0; i < times; i++) {
                const prize = prizePool.shift();
                if (prize) {
                    thisWin += prize.amount;
                    winCount[prize.rank]++;        // 当選回数カウント
                    resultsThisTime.push(prize);
                } else {
                    resultsThisTime.push(null);
                }
            }

            totalWon += thisWin;
            balance += thisWin;
            history.push(...resultsThisTime);
            if (history.length > 50) history.shift();

            updateUI();
            checkSpinLimit();

            if (times === 1 && resultsThisTime[0]) showResultModal(resultsThisTime[0]);
            else if (times === 1) alert("はずれ...");
        }

        function updateUI() {
            document.getElementById('balance').textContent = balance.toLocaleString();
            document.getElementById('totalWin').textContent = totalWon.toLocaleString();
            document.getElementById('totalSpins').textContent = totalSpins.toLocaleString();
            document.getElementById('totalWon').textContent = totalWon.toLocaleString();
            
            const net = totalWon - totalCost;
            const netEl = document.getElementById('net');
            netEl.textContent = net.toLocaleString();
            netEl.className = net >= 0 ? "text-4xl font-bold text-green-400" : "text-4xl font-bold text-red-400";

            renderHistory();
            renderPrizeWinStats();   // 新規追加
        }

        // 新規関数：賞別当選回数表示
        function renderPrizeWinStats() {
            const container = document.getElementById('prizeStats');
            container.innerHTML = '';

            const ranks = ["S", "A", "B", "C"];
            ranks.forEach(rank => {
                const div = document.createElement('div');
                div.className = `bg-gray-800 rounded-2xl p-5 text-center border border-gray-700`;
                div.innerHTML = `
                    <div class="w-8 h-8 mx-auto rounded-2xl flex items-center justify-center font-bold text-xl prize-${rank}">${rank}</div>
                    <div class="mt-3 text-3xl font-bold">${winCount[rank]}</div>
                    <div class="text-xs text-gray-400">回当選</div>
                `;
                container.appendChild(div);
            });
        }

        function renderHistory() {
            const container = document.getElementById('history');
            container.innerHTML = '';
            [...history].reverse().forEach(prize => {
                const div = document.createElement('div');
                div.className = `flex justify-between items-center px-5 py-4 rounded-2xl ${prize ? 'bg-gradient-to-r from-yellow-900/30' : 'bg-gray-800'}`;
                if (prize) {
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-8 h-8 rounded-2xl flex items-center justify-center font-bold prize-${prize.rank}">${prize.rank}</div>
                            <span class="text-lg">${prize.rank}賞</span>
                        </div>
                        <span class="font-mono text-2xl text-green-400">+${prize.amount}</span>
                    `;
                } else {
                    div.innerHTML = `<span class="text-gray-500 text-lg">はずれ</span><span class="font-mono text-gray-600">-0</span>`;
                }
                container.appendChild(div);
            });
        }

        function showResultModal(prize) {
            const modal = document.getElementById('resultModal');
            const prizeDiv = document.getElementById('modalPrize');
            prizeDiv.className = `p-10 text-center text-7xl font-bold prize-${prize.rank}`;
            prizeDiv.textContent = `${prize.rank}賞 当選！`;
            document.getElementById('modalAmount').textContent = prize.amount.toLocaleString() + " コイン";
            modal.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('resultModal').classList.add('hidden'); }
        function clearHistory() { history = []; renderHistory(); }

        function resetToDefault() {
            if (!confirm("すべて初期設定に戻しますか？")) return;
            
            balance = 2000000; 
            totalSpins = totalCost = totalWon = 0; 
            history = [];
            winCount = { S: 0, A: 0, B: 0, C: 0 };   // カウンターもリセット

            document.getElementById('initialBalance').value = 2000000;
            document.getElementById('coinPerSpin').value = 10000;
            document.getElementById('totalSlots').value = 12000;
            document.getElementById('targetRTP').value = 97;

            prizes = [
                { rank: "S", amount: 1000000, count: 1, locked: false },
                { rank: "A", amount: 51700, count: 35, locked: false },
                { rank: "B", amount: 18000, count: 6280, locked: false },
                { rank: "C", amount: 100, count: 5684, locked: false }
            ];
            
            renderPrizeSettings();
            rebuildPool();
            updateUI();
        }

        window.onload = () => {
            renderPrizeSettings();
            rebuildPool();
            updateUI();
        };
    </script>
</body>
</html>
